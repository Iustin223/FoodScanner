{% extends 'base.html' %}


{% block title %} Scaneaza - FoodScanner {% endblock title %}

{% block content %}
    
    <section class="scan-section">
    <div class="scan-container">
        <h1>Scanează un produs</h1>
        <p class="scan-subtitle">Încarcă o poză cu eticheta unui produs alimentar</p>
        
        <form id="uploadForm" class="upload-form">
            <label class="upload-area" id="dropZone">
                <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
                <img id="preview" class="preview-img" style="display:none;">
                <div id="uploadPrompt" class="upload-prompt">
                    <span class="upload-icon"><i class="fa-solid fa-camera-retro fa-lg" style="color: rgb(251, 160, 51);"></i></span>
                    <span>Click sau trage o imagine aici</span>
                </div>
            </label>
            <div class="btn-row">
        <button type="button" class="btn btn-clear" id="clearBtn" style="display:none;">✕ Sterge</button>
        <button type="submit" class="btn btn-primary scan-btn" id="scanBtn">⌘ Scanează</button>
            </div>
        </form>
        
        <div id="results"></div>
    </div>
</section>

{% endblock content %}


{% block scripts %}
    <script src="/static/app.js"></script>
{% endblock scripts %}
